apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-calling-agent
  labels:
    app: ai-calling-agent
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ai-calling-agent
  template:
    metadata:
      labels:
        app: ai-calling-agent
    spec:
      containers:
      - name: ai-calling-agent
        image: antigravity/ai-calling-agent:latest
        ports:
        - containerPort: 3000
        envFrom:
        - configMapRef:
            name: ai-calling-config
        - secretRef:
            name: ai-calling-secrets
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ai-calling-agent-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ai-calling-agent
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
